<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anonymous Chat - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
</head>
<body>
  <div class="app-layout">
    <aside class="app-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-user">
          <img class="avatar" id="userAvatar" src="assets/images/avatar-default.svg" alt="">
          <div class="sidebar-user-info">
            <div class="user-id" id="userId">kv-dev-000000</div>
            <div class="user-status">Trực tuyến</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Trang chủ
        </a>
        <a href="settings.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          Cài đặt
        </a>
      </nav>

      <div class="sidebar-friends-header" style="padding: 0 12px; margin-bottom: 8px; margin-top: 8px;">
        <h3>Bạn bè</h3>
      </div>
      <div class="sidebar-friends" id="friendsList">
      </div>
    </aside>

    <main class="app-main">
      <header class="app-header">
        <button class="btn btn-ghost btn-icon mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div class="header-left">
          <h1 style="font-size: 1.25rem; font-weight: 700;">Dashboard</h1>
        </div>

        <div class="header-right">
          <div id="notificationBell"></div>
          <a href="settings.html" class="btn btn-ghost btn-icon" title="Cài đặt">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
          </a>
        </div>
      </header>

      <div id="notificationPanel"></div>

      <div class="app-content">
        <div class="search-section">
          <div class="search-box">
            <input type="text" class="input" id="searchInput" placeholder="Nhập ID bạn bè (vd: kv-dev-482719)" autocomplete="off">
            <button class="btn btn-primary" id="searchBtn">Tìm bạn</button>
          </div>
          <div id="searchResult"></div>
        </div>

        <div class="friends-section">
          <h2>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Danh sách bạn bè
          </h2>
          <div class="friends-grid" id="friendsListContainer"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
