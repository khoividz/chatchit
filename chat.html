<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anonymous Chat - Nhắn tin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
</head>
<body>
  <div class="app-layout">
    <aside class="app-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-user">
          <img class="avatar" id="userAvatar" src="assets/images/avatar-default.svg" alt="">
          <div class="sidebar-user-info">
            <div class="user-id" id="userId">kv-dev-000000</div>
            <div class="user-status">Trực tuyến</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Trang chủ
        </a>
        <a href="settings.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          Cài đặt
        </a>
      </nav>

      <div class="sidebar-friends-header" style="padding: 0 12px; margin-bottom: 8px; margin-top: 8px;">
        <h3>Bạn bè</h3>
      </div>
      <div class="sidebar-friends" id="chatSidebarFriends">
      </div>
    </aside>

    <main class="app-main">
      <div class="chat-container">
        <div class="chat-header">
          <button class="btn btn-ghost btn-icon mobile-menu-btn" id="sidebarToggle" aria-label="Menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>

          <button class="btn btn-ghost btn-icon" id="backBtn" aria-label="Quay lại">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m15 18-6-6 6-6"/>
            </svg>
          </button>

          <img class="avatar" id="chatAvatar" src="assets/images/avatar-default.svg" alt="">

          <div class="chat-user-info">
            <div class="chat-user-name" id="chatUserName">Đang tải...</div>
            <div class="chat-user-id" id="chatUserId"></div>
          </div>

          <div class="header-right" style="display: flex; align-items: center; gap: 8px;">
            <a href="settings.html" class="btn btn-ghost btn-icon" id="chatSettingsBtn" title="Cài đặt">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
              </svg>
            </a>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages">
          <div class="chat-empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <h3>Đang tải cuộc trò chuyện...</h3>
          </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
          <span>Đang nhập</span>
          <div class="typing-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="chat-input-area">
          <div class="input-wrapper">
            <textarea id="chatInput" placeholder="Nhập tin nhắn..." rows="1"></textarea>
          </div>
          <button class="btn-send" id="sendBtn" disabled aria-label="Gửi">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m22 2-7 20-4-9-9-4Z"/>
              <path d="M22 2 11 13"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
