<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nhắn tin ẩn danh, kết nối không ràng buộc">
  <title>Anonymous Chat - Nhắn tin ẩn danh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
</head>
<body>
  <div class="landing-page">
    <div class="landing-content">
      <div class="landing-logo">
        <svg width="52" height="52" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="10" fill="#1e293b"/>
          <path d="M10 12a2 2 0 012-2h16a2 2 0 012 2v12a2 2 0 01-2 2h-3l-4 4-4-4h-5a2 2 0 01-2-2V12z" fill="#e2e8f0" opacity="0.9"/>
          <path d="M15 16h10M15 20h8M15 24h6" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Anonymous Chat</span>
      </div>

      <h1>Nhắn tin ẩn danh,<br>kết nối không ràng buộc</h1>
      <p>Tạo tài khoản ẩn danh ngay lập tức, kết bạn và trò chuyện mà không cần tiết lộ danh tính thật của bạn.</p>

      <button class="btn btn-primary btn-lg" id="createAccountBtn">
        Tạo tài khoản ẩn danh
      </button>

      <div class="landing-loading" id="landingLoading" style="display:none;">
        <div class="spinner"></div>
        <span style="color: var(--text-secondary); font-size: 0.9375rem;">Đang tạo tài khoản...</span>
      </div>
    </div>

    <div class="landing-footer">
      &copy; 2024 Anonymous Chat &mdash; Ẩn danh và bảo mật
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
