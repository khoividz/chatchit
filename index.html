<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Nhắn tin ẩn danh, kết nối không ràng buộc">
  <title>Anonymous Chat - Đăng nhập</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(59, 130, 246, 0.03) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(30, 41, 59, 0.02) 0%, transparent 60%);
      pointer-events: none;
    }
    .auth-content {
      position: relative;
      text-align: center;
      max-width: 400px;
      width: 100%;
      z-index: 1;
    }
    .auth-logo {
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .auth-logo svg { width: 48px; height: 48px; }
    .auth-logo span {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .auth-tabs {
      display: flex;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 6px;
      transition: all var(--transition);
    }
    .auth-tab.active {
      background: var(--bg-card);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }
    .auth-form {
      display: none;
      text-align: left;
    }
    .auth-form.active { display: block; }
    .auth-form .input-group {
      margin-bottom: 16px;
    }
    .auth-form .input-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .auth-form .input-group .input {
      width: 100%;
    }
    .auth-form .btn {
      width: 100%;
      margin-top: 8px;
    }
    .auth-error {
      color: var(--danger);
      font-size: 0.8125rem;
      margin-top: 8px;
      display: none;
    }
    .auth-footer {
      margin-top: 24px;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
    .auth-loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
    }
    .auth-loading .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .auth-loading.show { display: flex; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-content">
      <div class="auth-logo">
        <svg width="48" height="48" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="10" fill="#1e293b"/>
          <path d="M10 12a2 2 0 012-2h16a2 2 0 012 2v12a2 2 0 01-2 2h-3l-4 4-4-4h-5a2 2 0 01-2-2V12z" fill="#e2e8f0" opacity="0.9"/>
          <path d="M15 16h10M15 20h8M15 24h6" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Anonymous Chat</span>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Đăng nhập</button>
        <button class="auth-tab" data-tab="register">Đăng ký</button>
      </div>

      <div class="auth-form active" id="loginForm">
        <div class="input-group">
          <label>Tên đăng nhập</label>
          <input type="text" class="input" id="loginUsername" placeholder="Nhập tên đăng nhập" autocomplete="username">
        </div>
        <div class="input-group">
          <label>Mật khẩu</label>
          <input type="password" class="input" id="loginPassword" placeholder="Nhập mật khẩu" autocomplete="current-password">
        </div>
        <button class="btn btn-primary" id="loginBtn">Đăng nhập</button>
        <div class="auth-error" id="loginError"></div>
        <div class="auth-loading" id="loginLoading">
          <div class="spinner"></div>
          <span style="font-size:0.875rem;color:var(--text-secondary);">Đang đăng nhập...</span>
        </div>
      </div>

      <div class="auth-form" id="registerForm">
        <div class="input-group">
          <label>Tên đăng nhập</label>
          <input type="text" class="input" id="registerUsername" placeholder="Chữ thường, số và dấu gạch dưới" autocomplete="username">
        </div>
        <div class="input-group">
          <label>Mật khẩu</label>
          <input type="password" class="input" id="registerPassword" placeholder="Ít nhất 4 ký tự" autocomplete="new-password">
        </div>
        <div class="input-group">
          <label>Nhập lại mật khẩu</label>
          <input type="password" class="input" id="registerConfirm" placeholder="Nhập lại mật khẩu" autocomplete="new-password">
        </div>
        <button class="btn btn-primary" id="registerBtn">Đăng ký</button>
        <div class="auth-error" id="registerError"></div>
        <div class="auth-loading" id="registerLoading">
          <div class="spinner"></div>
          <span style="font-size:0.875rem;color:var(--text-secondary);">Đang tạo tài khoản...</span>
        </div>
      </div>

      <div class="auth-footer">
        &copy; 2024 Anonymous Chat &mdash; Ẩn danh và bảo mật
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/reactions.js"></script>
  <script src="js/wallpaper.js"></script>
  <script src="js/customSticker.js"></script>
  <script src="js/stickers.js"></script>
  <script src="js/groups.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
